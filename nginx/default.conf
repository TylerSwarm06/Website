server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /health {
        proxy_pass http://portfolio-backend:9000/health;
    }

    location /projects {
        proxy_pass http://portfolio-backend:9000/projects;
    }
}
