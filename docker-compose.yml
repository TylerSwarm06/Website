services:
  backend:
    build:
      context: ./backend
    container_name: portfolio-backend
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: portfolio-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped